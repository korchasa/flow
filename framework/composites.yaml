# Composite Skill Generation manifest (FR-SKILL-COMPOSE).
#
# Read by scripts/generate-skill-composites.ts (--check / --write modes).
# Excluded from framework.tar.gz by .github/workflows/ci.yml `tar --exclude`
# and re-checked by scripts/check-pack-refs.ts `--leakage` mode.
# Never shipped to user IDE configs.
schema_version: 1
atoms:
  plan-exp-permanent-tasks:
    source: framework/atoms/plan-exp-permanent-tasks.md
    target: framework/core/commands/plan-exp-permanent-tasks/SKILL.md
    default_params:
      TERMINATION: TOTAL_STOP
  review:
    source: framework/atoms/review.md
    target: framework/core/skills/review/SKILL.md
  commit-beta:
    source: framework/atoms/commit-beta.md
    target: framework/core/commands/commit-beta/SKILL.md
    default_params:
      DIFF_SOURCE: FRESH_READ
  do:
    source: framework/atoms/do.md
    target: framework/core/skills/do/SKILL.md
    default_params:
      TERMINATION: TOTAL_STOP
  push:
    source: framework/atoms/push.md
    target: framework/core/commands/push/SKILL.md
    default_params:
      TERMINATION: TOTAL_STOP
composites:
  review-and-commit:
    target: framework/core/commands/review-and-commit/SKILL.md
    wrapper: framework/composites/review-and-commit.md
    phases:
      - title: Phase 1 — Review
        atom: review
      - title: Phase 2 — Commit
        atom: commit-beta
        params:
          DIFF_SOURCE: REUSE_PRIOR_PHASE
  do-with-plan:
    target: framework/core/commands/do-with-plan/SKILL.md
    wrapper: framework/composites/do-with-plan.md
    phases:
      - title: Plan Phase
        atom: plan-exp-permanent-tasks
        params:
          TERMINATION: HAND_OFF_TO_NEXT
      - title: Implement Phase
        inline: true
      - title: Review-and-Commit Phase (review)
        atom: review
      - title: Commit Steps (continuation of Review-and-Commit Phase)
        atom: commit-beta
        params:
          DIFF_SOURCE: REUSE_PRIOR_PHASE
  ship:
    target: framework/core/commands/ship/SKILL.md
    wrapper: framework/composites/ship.md
    phases:
      - title: Plan Phase
        atom: plan-exp-permanent-tasks
        params:
          TERMINATION: HAND_OFF_TO_NEXT
      - title: Implement Phase
        atom: do
        params:
          TERMINATION: HAND_OFF_TO_NEXT
      - title: Review Phase
        atom: review
      - title: Commit Phase
        atom: commit-beta
        params:
          DIFF_SOURCE: REUSE_PRIOR_PHASE
      - title: Push Phase
        atom: push
        params:
          TERMINATION: TOTAL_STOP
